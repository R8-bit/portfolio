<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Адаптивный фон</title>
    <link rel="stylesheet" href="/css/что это.css">
</head>
<body>
    <div class="bg-container">
        <img id="bgImage" class="bg-image" src="/image/2ГОТОВАЯ(350) КРУГОВАЯ ЧтоЭто.png" alt="Background">
    </div>

    <div class="scroll-indicator">Прокрутите вниз</div>

    <div class="content">
        <div class="content-section">
            <h1>НАШ ФУТБОЛ</h1>
            <p>ПРАВИЛА ПРОВЕДЕНИЯ ИГР</p>
        </div>

    <script>
        const bgImage = document.getElementById('bgImage');
        const scrollIndicator = document.querySelector('.scroll-indicator');
        
        window.addEventListener('scroll', () => {
            const scrolled = window.pageYOffset;
            const maxScroll = document.documentElement.scrollHeight - window.innerHeight;
            const scrollPercent = scrolled / maxScroll;
            
            // Изображение 14364px высотой, экран меньше, поэтому нужно рассчитать смещение
            const imageHeight = 14364;
            const viewportHeight = window.innerHeight;
            const maxTranslate = imageHeight - viewportHeight;
            
            // Перемещаем изображение пропорционально прокрутке
            const translateY = -(scrollPercent * maxTranslate);
            bgImage.style.transform = `translateY(${translateY}px)`;
            
            // Скрываем индикатор прокрутки после начала скролла
            if (scrolled > 100) {
                scrollIndicator.style.opacity = '0';
            } else {
                scrollIndicator.style.opacity = '1';
            }
        });
    </script>
</body>
</html>
