<!doctype html>
<html lang="ru">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>Вход - Админ-панель JUGGLER</title>

		<!-- Fonts (same as main site) -->
		<link
			href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Montserrat:wght@300;400;600&display=swap"
			rel="stylesheet"
		/>

		<!-- Favicon -->
		<link
			rel="icon"
			href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🎪</text></svg>"
		/>

		<style>
			* {
				margin: 0;
				padding: 0;
				box-sizing: border-box;
			}

			:root {
				--bg-black: #0a0a0a;
				--bg-dark: #1a1a1a;
				--accent-red: #ff0000;
				--accent-gold: #ffcc00;
				--text-white: #ffffff;
				--text-gray: #a0a0a0;
				--border-color: #333;
			}

			body {
				font-family: 'Montserrat', sans-serif;
				background-color: var(--bg-black);
				color: var(--text-white);
				min-height: 100vh;
				display: flex;
				align-items: center;
				justify-content: center;
				padding: 20px;
				position: relative;
				overflow: hidden;
			}

			/* Animated background effect */
			body::before {
				content: '';
				position: absolute;
				top: -50%;
				left: -50%;
				width: 200%;
				height: 200%;
				background: radial-gradient(
					circle,
					rgba(255, 0, 0, 0.05) 0%,
					transparent 70%
				);
				animation: pulse 15s ease-in-out infinite;
				pointer-events: none;
			}

			@keyframes pulse {
				0%,
				100% {
					transform: scale(1) rotate(0deg);
					opacity: 0.3;
				}
				50% {
					transform: scale(1.1) rotate(180deg);
					opacity: 0.5;
				}
			}

			.login-container {
				background: rgba(26, 26, 26, 0.95);
				backdrop-filter: blur(10px);
				border: 1px solid var(--border-color);
				border-radius: 0;
				padding: 60px 50px;
				width: 100%;
				max-width: 450px;
				box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
				position: relative;
				z-index: 1;
			}

			.login-container::before {
				content: '';
				position: absolute;
				top: 0;
				left: 0;
				right: 0;
				height: 4px;
				background: linear-gradient(
					90deg,
					var(--accent-red),
					var(--accent-gold)
				);
			}

			.login-header {
				text-align: center;
				margin-bottom: 40px;
			}

			.login-header h1 {
				font-family: 'Bebas Neue', sans-serif;
				font-size: 48px;
				color: var(--accent-red);
				letter-spacing: 4px;
				margin-bottom: 5px;
			}

			.login-header p {
				color: var(--text-gray);
				font-size: 14px;
				text-transform: uppercase;
				letter-spacing: 2px;
			}

			.form-group {
				margin-bottom: 25px;
			}

			.form-group label {
				display: block;
				margin-bottom: 10px;
				color: var(--text-gray);
				font-weight: 400;
				font-size: 13px;
				text-transform: uppercase;
				letter-spacing: 1px;
			}

			.form-group input {
				width: 100%;
				padding: 15px 20px;
				background: rgba(0, 0, 0, 0.5);
				border: 1px solid var(--border-color);
				border-radius: 0;
				color: var(--text-white);
				font-size: 14px;
				font-family: 'Montserrat', sans-serif;
				transition: all 0.3s ease;
			}

			.form-group input:focus {
				outline: none;
				border-color: var(--accent-red);
				background: rgba(0, 0, 0, 0.7);
				box-shadow: 0 0 0 1px var(--accent-red);
			}

			.form-group input::placeholder {
				color: #555;
			}

			.btn-login {
				width: 100%;
				padding: 16px;
				background: var(--accent-red);
				color: var(--text-white);
				border: none;
				border-radius: 0;
				font-size: 14px;
				font-weight: 600;
				text-transform: uppercase;
				letter-spacing: 2px;
				cursor: pointer;
				transition: all 0.3s ease;
				font-family: 'Montserrat', sans-serif;
				margin-top: 10px;
			}

			.btn-login:hover {
				background: #cc0000;
				box-shadow: 0 5px 20px rgba(255, 0, 0, 0.4);
				transform: translateY(-2px);
			}

			.btn-login:active {
				transform: translateY(0);
			}

			.error-message {
				background: rgba(255, 0, 0, 0.1);
				color: var(--accent-red);
				padding: 15px 20px;
				margin-bottom: 25px;
				font-size: 13px;
				display: none;
				border-left: 3px solid var(--accent-red);
			}

			.error-message.show {
				display: block;
				animation: shake 0.5s;
			}

			@keyframes shake {
				0%,
				100% {
					transform: translateX(0);
				}
				25% {
					transform: translateX(-10px);
				}
				75% {
					transform: translateX(10px);
				}
			}

			.login-footer {
				text-align: center;
				margin-top: 30px;
				padding-top: 20px;
				border-top: 1px solid var(--border-color);
			}

			.login-footer a {
				color: var(--text-gray);
				font-size: 13px;
				text-transform: uppercase;
				letter-spacing: 1px;
				transition: color 0.3s ease;
			}

			.login-footer a:hover {
				color: var(--accent-red);
			}

			/* Responsive */
			@media (max-width: 768px) {
				.login-container {
					padding: 40px 30px;
				}

				.login-header h1 {
					font-size: 36px;
				}
			}
		</style>
	</head>
	<body>
		<div class="login-container">
			<div class="login-header">
				<h1>JUGGLER</h1>
				<p>Админ-панель</p>
			</div>

			<div id="errorMessage" class="error-message"></div>

			<form id="loginForm">
				<div class="form-group">
					<label for="username">Логин</label>
					<input
						type="text"
						id="username"
						name="username"
						required
						autocomplete="username"
						placeholder="Введите логин"
					/>
				</div>

				<div class="form-group">
					<label for="password">Пароль</label>
					<input
						type="password"
						id="password"
						name="password"
						required
						autocomplete="current-password"
						placeholder="Введите пароль"
					/>
				</div>

				<button type="submit" class="btn-login">Войти</button>
			</form>

			<div class="login-footer">
				<a href="index.html">← Вернуться на сайт</a>
			</div>
		</div>

		<script src="js/auth.js"></script>
	</body>
</html>
