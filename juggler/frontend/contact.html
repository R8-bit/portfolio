<!doctype html>
<html lang="ru">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title data-i18n="contact.title">Связь с нами | JUGGLER</title>

		<!-- Fonts -->
		<link
			href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Montserrat:wght@300;400;600&display=swap"
			rel="stylesheet"
		/>

		<!-- Compiled CSS -->
		<link rel="stylesheet" href="css/compiled.css" />

		<!-- Favicon -->
		<link
			rel="icon"
			href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🎪</text></svg>"
		/>
	</head>
	<body>
		<!-- HEADER -->
		<header id="header">
			<div class="container">
				<div class="header-content">
					<a
						href="index.html"
						class="logo mobile-only"
						data-i18n="site.shortTitle"
						>JUGGLER</a
					>

					<nav class="nav" id="mainNav">
						<a
							href="index.html"
							class="nav-logo desktop-only"
							data-i18n="site.shortTitle"
							>JUGGLER</a
						>
						<a href="video.html" class="nav-link" data-i18n="nav.videos"
							>Видео</a
						>
						<a href="gallery.html" class="nav-link" data-i18n="nav.gallery"
							>Галерея</a
						>
						<a
							href="#"
							class="nav-link"
							id="ticketsLink"
							data-i18n="nav.tickets"
							>Билеты</a
						>
						<a
							href="contact.html"
							class="nav-link active"
							data-i18n="nav.contact"
							>Связь с нами</a
						>
						<button class="language-switcher" id="langSwitcher">RU</button>
					</nav>

					<button class="menu-toggle" id="menuToggle" aria-label="Меню">
						<span></span>
						<span></span>
						<span></span>
					</button>
				</div>
			</div>
		</header>

		<!-- Nav Overlay -->
		<div class="nav-overlay" id="navOverlay"></div>

		<!-- CONTACT PAGE SECTION -->
		<section class="contact-page">
			<!-- Фиксированный видео фон -->
			<div class="fixed-video-bg">
				<video autoplay muted loop playsinline id="bgVideo">
					<!-- Видео будет установлено из JS -->
				</video>
				<div class="video-overlay"></div>
			</div>

			<div class="container">
				<div class="page-header">
					<h1 class="page-title" data-i18n="contact.title">Связь с нами</h1>
					<p class="page-subtitle" data-i18n="contact.subtitle">
						Мы всегда рады вашим вопросам
					</p>
				</div>

				<!-- Форма связи -->
				<div class="contact-form-container">
					<form id="contactForm" class="contact-form">
						<div class="form-row">
							<div class="form-group">
								<label for="firstName">
									<span data-i18n="contact.form.firstName">Имя</span>
									<span class="required">*</span>
								</label>
								<input
									type="text"
									id="firstName"
									name="firstName"
									required
									data-i18n-attr="placeholder"
									data-i18n="contact.form.firstName"
								/>
							</div>
							<div class="form-group">
								<label for="lastName">
									<span data-i18n="contact.form.lastName">Фамилия</span>
									<span class="required">*</span>
								</label>
								<input
									type="text"
									id="lastName"
									name="lastName"
									required
									data-i18n-attr="placeholder"
									data-i18n="contact.form.lastName"
								/>
							</div>
						</div>

						<div class="form-row">
							<div class="form-group">
								<label for="phone">
									<span data-i18n="contact.form.phone">Телефон</span>
									<span class="required">*</span>
								</label>
								<div class="phone-input">
									<select
										id="countryCode"
										name="countryCode"
										class="country-code"
									>
										<option value="+7" selected>🇷🇺 +7</option>
										<option value="+1">🇺🇸 +1</option>
										<option value="+44">🇬🇧 +44</option>
										<option value="+49">🇩🇪 +49</option>
										<option value="+33">🇫🇷 +33</option>
										<option value="+86">🇨🇳 +86</option>
										<option value="+81">🇯🇵 +81</option>
									</select>
									<input
										type="tel"
										id="phone"
										name="phone"
										required
										placeholder="999 123-45-67"
									/>
								</div>
							</div>
							<div class="form-group">
								<label for="email">
									<span data-i18n="contact.form.email">Email</span>
									<span class="required">*</span>
								</label>
								<input
									type="email"
									id="email"
									name="email"
									required
									placeholder="example@mail.com"
								/>
							</div>
						</div>

						<div class="form-group full-width">
							<label for="subject">
								<span data-i18n="contact.form.subject">Тема сообщения</span>
								<span class="required">*</span>
							</label>
							<input
								type="text"
								id="subject"
								name="subject"
								required
								data-i18n-attr="placeholder"
								data-i18n="contact.form.subject"
							/>
						</div>

						<button type="submit" class="submit-btn" id="submitBtn">
							<span data-i18n="contact.form.submit">Отправить</span>
						</button>

						<div class="form-message" id="formMessage"></div>
					</form>
				</div>
			</div>
		</section>

		<!-- FOOTER -->
		<footer class="footer">
			<div class="container">
				<div class="footer-content">
					<a href="index.html" class="footer-logo">JUGGLER</a>
					<div class="footer-links">
						<h4 data-i18n="footer.sections">Разделы</h4>
						<ul>
							<li><a href="video.html" data-i18n="nav.videos">Видео</a></li>
							<li>
								<a href="gallery.html" data-i18n="nav.gallery">Галерея</a>
							</li>
							<li>
								<a href="contact.html" data-i18n="nav.contact">Связь с нами</a>
							</li>
						</ul>
					</div>
				</div>

				<div class="social-container">
					<div class="social-links" id="socialLinks"></div>
				</div>

				<div class="footer-bottom">
					<p data-i18n="footer.copyright">
						© 2026 JUGGLER. Все права защищены.
					</p>
				</div>
			</div>
		</footer>

		<!-- Scroll to Top -->
		<button class="scroll-to-top" id="scrollToTop" aria-label="Наверх">
			↑
		</button>

		<!-- Scripts -->
		<script src="i18n/i18n.js"></script>
		<script src="js/loader.js"></script>
		<script src="js/main.js"></script>
		<script src="js/contact-page.js"></script>
	</body>
</html>
