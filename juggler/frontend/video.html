<!doctype html>
<html lang="ru">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title data-i18n="videos.title">Видео-галерея | JUGGLER</title>

		<!-- Fonts -->
		<link
			href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Montserrat:wght@300;400;600&display=swap"
			rel="stylesheet"
		/>

		<!-- Compiled CSS -->
		<link rel="stylesheet" href="css/compiled.css" />

		<!-- Favicon -->
		<link
			rel="icon"
			href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🎪</text></svg>"
		/>
	</head>
	<body>
		<!-- HEADER -->
		<header id="header">
			<div class="container">
				<div class="header-content">
					<a
						href="index.html"
						class="logo mobile-only"
						data-i18n="site.shortTitle"
						>JUGGLER</a
					>

					<nav class="nav" id="mainNav">
						<a
							href="index.html"
							class="nav-logo desktop-only"
							data-i18n="site.shortTitle"
							>JUGGLER</a
						>
						<a href="video.html" class="nav-link active" data-i18n="nav.videos"
							>Видео</a
						>
						<a href="gallery.html" class="nav-link" data-i18n="nav.gallery"
							>Галерея</a
						>
						<a
							href="#"
							class="nav-link"
							id="ticketsLink"
							data-i18n="nav.tickets"
							>Билеты</a
						>
						<a href="contact.html" class="nav-link" data-i18n="nav.contact"
							>Связь с нами</a
						>
						<button class="language-switcher" id="langSwitcher">RU</button>
					</nav>

					<button class="menu-toggle" id="menuToggle" aria-label="Меню">
						<span></span>
						<span></span>
						<span></span>
					</button>
				</div>
			</div>
		</header>

		<!-- Nav Overlay -->
		<div class="nav-overlay" id="navOverlay"></div>

		<!-- VIDEO GALLERY SECTION -->
		<section class="video-gallery-page">
			<!-- Фиксированный видео фон -->
			<div class="fixed-video-bg">
				<video autoplay muted loop playsinline id="bgVideo">
					<!-- Видео будет установлено из JS -->
				</video>
				<div class="video-overlay"></div>
			</div>

			<!-- Header -->
			<header class="page-header" id="pageHeader">
				<div
					class="container"
					style="
						height: 100%;
						display: flex;
						flex-direction: column;
						justify-content: center;
						align-items: center;
					"
				>
					<h1 class="page-title animate-text" data-i18n="videos.title">
						Видео-галерея
					</h1>
					<p class="page-subtitle animate-text" data-i18n="videos.subtitle">
						Наши выступления в действии
					</p>
					<button
						class="scroll-down-btn"
						id="scrollDownBtn"
						aria-label="Scroll Down"
					>
						<svg
							width="24"
							height="24"
							viewBox="0 0 24 24"
							fill="none"
							stroke="currentColor"
							stroke-width="2"
							stroke-linecap="round"
							stroke-linejoin="round"
						>
							<path d="M7 13l5 5 5-5M7 6l5 5 5-5" />
						</svg>
					</button>
				</div>
			</header>

			<!-- Anchor for scrolling -->
			<div id="galleryStart"></div>

			<div class="container">
				<!-- Сетка видео -->
				<div class="video-grid" id="videoGrid">
					<!-- Видео будут загружены из БД -->
				</div>
			</div>
		</section>

		<!-- VIDEO MODAL -->
		<div class="video-modal" id="videoModal">
			<div class="modal-backdrop" id="modalBackdrop"></div>
			<div class="modal-container">
				<button class="modal-close" id="modalClose" aria-label="Закрыть">
					<svg
						width="24"
						height="24"
						viewBox="0 0 24 24"
						fill="none"
						stroke="currentColor"
						stroke-width="2"
					>
						<line x1="18" y1="6" x2="6" y2="18"></line>
						<line x1="6" y1="6" x2="18" y2="18"></line>
					</svg>
				</button>
				<div class="video-player-container">
					<video id="modalVideo" controls>
						<source src="" type="video/mp4" />
						Ваш браузер не поддерживает видео.
					</video>
				</div>
				<div class="video-info">
					<h3 id="videoTitle"></h3>
					<p id="videoDescription"></p>
				</div>
			</div>
		</div>

		<!-- FOOTER -->
		<footer class="footer">
			<div class="container">
				<div class="footer-content">
					<a href="index.html" class="footer-logo">JUGGLER</a>
					<div class="footer-links">
						<h4 data-i18n="footer.sections">Разделы</h4>
						<ul>
							<li><a href="video.html" data-i18n="nav.videos">Видео</a></li>
							<li>
								<a href="gallery.html" data-i18n="nav.gallery">Галерея</a>
							</li>
							<li>
								<a href="contact.html" data-i18n="nav.contact">Связь с нами</a>
							</li>
						</ul>
					</div>
				</div>

				<div class="social-container">
					<div class="social-links" id="socialLinks"></div>
				</div>

				<div class="footer-bottom">
					<p data-i18n="footer.copyright">
						© 2026 JUGGLER. Все права защищены.
					</p>
				</div>
			</div>
		</footer>

		<!-- Scroll to Top -->
		<button class="scroll-to-top" id="scrollToTop" aria-label="Наверх">
			↑
		</button>

		<!-- Scripts -->
		<script src="i18n/i18n.js"></script>
		<script src="js/loader.js"></script>
		<script src="js/main.js"></script>
		<script src="js/video-page.js"></script>
	</body>
</html>
